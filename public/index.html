<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kapruka MCP Status</title>
  <!-- Inline favicon so the browser never 404s on /favicon.ico -->
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'&gt;&lt;text y='14' font-size='14'&gt;🌴&lt;/text&gt;&lt;/svg&gt;" />
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      max-width: 640px; margin: 6vh auto; padding: 0 1.25rem; line-height: 1.5;
    }
    h1 { margin-bottom: .25rem; }
    .sub { color: #888; margin-top: 0; }
    button {
      font-size: 1rem; padding: .6rem 1.1rem; border-radius: .5rem;
      border: 1px solid #8884; cursor: pointer; background: #2563eb; color: #fff;
    }
    button:disabled { opacity: .6; cursor: progress; }
    .status { margin-top: 1.5rem; padding: 1rem 1.25rem; border-radius: .6rem; border: 1px solid #8883; }
    .ok { background: #16a34a22; border-color: #16a34a; }
    .fail { background: #dc262622; border-color: #dc2626; }
    .pending { background: #f59e0b22; border-color: #f59e0b; }
    pre { overflow-x: auto; background: #8881; padding: .75rem; border-radius: .5rem; }
    code { font-size: .9rem; }
  </style>
</head>
<body>
  <h1>🌴 Kapruka MCP Status</h1>
  <p class="sub">Live health check for <code>https://mcp.kapruka.com/mcp</code></p>

  <button id="run">Run health check</button>

  <div id="status" class="status pending">Click “Run health check” to test the MCP server.</div>

  <script>
    const btn = document.getElementById("run");
    const box = document.getElementById("status");

    async function check() {
      btn.disabled = true;
      box.className = "status pending";
      box.textContent = "Checking…";
      try {
        const res = await fetch("/api/check", { cache: "no-store" });
        const data = await res.json();
        if (data.ok) {
          box.className = "status ok";
          box.innerHTML =
            "<strong>✅ MCP server is working</strong>" +
            "<pre><code>" + JSON.stringify(data, null, 2) + "</code></pre>";
        } else {
          box.className = "status fail";
          box.innerHTML =
            "<strong>❌ MCP check failed</strong>" +
            "<pre><code>" + JSON.stringify(data, null, 2) + "</code></pre>";
        }
      } catch (err) {
        box.className = "status fail";
        box.textContent = "❌ Request failed: " + err;
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener("click", check);
    check(); // auto-run on load
  </script>
</body>
</html>
