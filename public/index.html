<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kapruka Gift Concierge</title>
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'&gt;&lt;text y='14' font-size='14'&gt;🌴&lt;/text&gt;&lt;/svg&gt;" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #f4f3ee; --bg-2: #efede4;
      --surface: #ffffff; --surface-2: #faf9f5; --surface-3: #efeee7;
      --text: #232220; --muted: #6e6a62; --faint: #9b968c;
      --primary: #c9682f; --primary-2: #9d4d1e; --accent: #c9682f;
      --orb-1: #e3a06a; --orb-2: #c9682f; --orb-3: #9f4f23;
      --border: rgba(60,50,40,.12); --border-2: rgba(60,50,40,.07);
      --ok: #16a34a; --bad: #dc2626;
      --ring: color-mix(in srgb, var(--primary) 22%, transparent);
      --shadow-sm: 0 1px 2px rgba(16,40,33,.06), 0 2px 6px rgba(16,40,33,.05);
      --shadow: 0 2px 4px rgba(16,40,33,.05), 0 14px 40px rgba(16,40,33,.10);
      --shadow-lg: 0 8px 16px rgba(16,40,33,.08), 0 24px 60px rgba(16,40,33,.16);
      --radius: 20px;
      /* Strong custom easings (Emil Kowalski) — built-in curves lack punch */
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
      --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);
      /* Secondary accent system: desaturated fills + borders for chips, inactive/secondary controls */
      --accent-soft: color-mix(in srgb, var(--primary) 13%, var(--surface));
      --accent-border: color-mix(in srgb, var(--primary) 32%, var(--border));
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-1: #171411; --bg-2: #1d1812;
        --surface: #221d17; --surface-2: #29231b; --surface-3: #322a20;
        --text: #f6f1e9; --muted: #b6ada0; --faint: #9c9384;
        --primary: #d77f47; --primary-2: #b35e2a; --accent: #d77f47;
        --orb-1: #ecb083; --orb-2: #d77f47; --orb-3: #a85a2b;
        --border: rgba(245,235,225,.11); --border-2: rgba(245,235,225,.06);
        --ring: color-mix(in srgb, var(--primary) 32%, transparent);
        --shadow-sm: 0 1px 2px rgba(0,0,0,.35), 0 2px 8px rgba(0,0,0,.4);
        --shadow: 0 2px 4px rgba(0,0,0,.3), 0 14px 44px rgba(0,0,0,.5);
        --shadow-lg: 0 10px 24px rgba(0,0,0,.45), 0 30px 70px rgba(0,0,0,.6);
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text); line-height: 1.55;
      height: 100dvh; overflow: hidden;
      display: flex; flex-direction: column;
      background:
        radial-gradient(1000px 600px at 50% -20%, var(--bg-2), transparent 70%),
        var(--bg-1);
    }
    h1, h2, h3 { font-family: Poppins, Inter, sans-serif; letter-spacing: -.01em; }
    a { color: var(--primary); }

    /* App bar (top) — flex-none header, the page itself never scrolls */
    .topbar { flex: 0 0 auto; z-index: 30; backdrop-filter: saturate(140%) blur(12px); background: color-mix(in srgb, var(--surface) 70%, transparent); border-bottom: 1px solid var(--border-2); }
    .topbar .inner { max-width: 760px; margin: 0 auto; padding: .7rem 1.1rem; display: flex; align-items: center; gap: .6rem; }
    .brand { display: flex; align-items: center; gap: .6rem; font-family: Poppins; font-weight: 700; font-size: 1.02rem; letter-spacing: -.01em; }
    .brand .mark { width: 34px; height: 34px; border-radius: 11px; display: grid; place-items: center; font-size: 1.05rem; color: #fff; background: linear-gradient(135deg, var(--primary), var(--orb-3)); box-shadow: 0 4px 12px color-mix(in srgb, var(--primary) 40%, transparent); }
    .iconbtn { width: 42px; height: 42px; padding: 0; border-radius: 50%; display: inline-grid; place-items: center; font-size: 1.1rem; background: var(--surface-3); color: var(--text); border: 1px solid var(--border-2); cursor: pointer; transition: background .15s ease, transform .14s var(--ease-out); }
    .iconbtn:hover { background: color-mix(in srgb, var(--primary) 12%, var(--surface-3)); }
    .iconbtn:active { transform: scale(.92); }
    .iconbtn.on { background: var(--primary); color: #fff; border-color: transparent; }
    .cartbtn { position: relative; margin-left: auto; }
    .badge { position: absolute; top: -5px; right: -5px; min-width: 1.25rem; height: 1.25rem; padding: 0 .32rem; border-radius: 999px; background: var(--primary-2); color: #fff; font-size: .7rem; font-weight: 700; line-height: 1; display: grid; place-items: center; box-shadow: 0 0 0 2px var(--bg-1), 0 2px 6px color-mix(in srgb, var(--primary) 40%, transparent); transition: transform .2s var(--ease-out); }
    .badge.bump { transform: scale(1.35); }
    .badge.zero { display: none; }

    /* Conversation scroller — the ONLY scrolling region */
    main { flex: 1 1 auto; min-height: 0; overflow-y: auto; overflow-x: hidden; overscroll-behavior: contain; scroll-behavior: smooth; display: flex; flex-direction: column; }
    /* margin-top: auto keeps a short conversation docked near the orb (no big empty gap),
       yet collapses to 0 once content overflows — so long threads scroll from the top, no clipping. */
    .thread { width: 100%; max-width: 760px; margin: auto auto 0; padding: 1.4rem 1.1rem 1rem; display: flex; flex-direction: column; }

    /* Bottom composer — the voice orb lives here and is ALWAYS visible (no scroll to reach it) */
    .composer { flex: 0 0 auto; z-index: 40; position: relative; padding: .5rem 1rem calc(1rem + env(safe-area-inset-bottom)); background: color-mix(in srgb, var(--surface) 78%, transparent); backdrop-filter: saturate(150%) blur(14px); border-top: 1px solid var(--border-2); box-shadow: 0 -10px 40px -24px rgba(16,40,33,.5); }
    .composer-inner { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: .15rem; }
    @media (max-height: 660px) { .orb { width: 92px; height: 92px; } .status { margin: .15rem 0 .35rem; } }

    /* Thinking overlay */
    .thinking { position: fixed; inset: 0; z-index: 55; display: none; }
    .thinking.on { display: block; }
    .thinking::before { content: ""; position: absolute; inset: 0; backdrop-filter: blur(2px); background: linear-gradient(to bottom, color-mix(in srgb, #000 42%, transparent) 0%, color-mix(in srgb, var(--bg-1) 48%, transparent) 32%, color-mix(in srgb, var(--bg-1) 22%, transparent) 100%); }
    .thinking-panel { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); width: min(92vw, 520px); z-index: 2; }

    /* Agent planning timeline (vanilla port of AgentPlanning) */
    .ap-card { background: color-mix(in srgb, var(--surface) 88%, transparent); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; backdrop-filter: blur(8px); }
    .ap-head { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1rem; cursor: pointer; user-select: none; border-bottom: 1px solid transparent; transition: background .2s; }
    .ap-head.open { background: color-mix(in srgb, var(--surface-3) 60%, transparent); border-bottom-color: var(--border-2); }
    .ap-head:hover { background: color-mix(in srgb, var(--surface-3) 50%, transparent); }
    .ap-head-left { display: flex; align-items: center; gap: .6rem; }
    .ap-title { font-family: Poppins, Inter, sans-serif; font-size: .95rem; font-weight: 600; color: var(--text); }
    .ap-chev { color: var(--muted); display: flex; }
    .ap-body { display: grid; grid-template-rows: 0fr; opacity: 0; transition: grid-template-rows .45s ease, opacity .35s ease; }
    .ap-body.open { grid-template-rows: 1fr; opacity: 1; }
    .ap-body > div { overflow: hidden; }
    .ap-steps { padding: 1rem 1rem .35rem; }
    .ap-step { position: relative; display: flex; gap: .85rem; animation: rise .4s var(--ease-out) both; }
    .ap-step.pending { opacity: .55; filter: grayscale(.25); }
    .ap-step:not(:last-child) .ap-step-col::after { content: ""; position: absolute; left: 11px; top: 26px; bottom: -8px; width: 2px; background: var(--border); }
    .ap-step-col { position: relative; flex: 0 0 24px; }
    .ap-icon { width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; background: var(--surface-3); color: var(--muted); box-shadow: 0 0 0 4px color-mix(in srgb, var(--surface) 88%, transparent); }
    .ap-icon.success { background: color-mix(in srgb, var(--ok) 18%, var(--surface)); color: var(--ok); }
    .ap-icon.active { background: color-mix(in srgb, #3b82f6 18%, var(--surface)); color: #2563eb; }
    .ap-icon.error { background: color-mix(in srgb, var(--bad) 18%, var(--surface)); color: var(--bad); }
    .ap-icon svg { width: 14px; height: 14px; }
    .ap-spin { animation: ap-spin .8s linear infinite; }
    @keyframes ap-spin { to { transform: rotate(360deg); } }
    .ap-main { flex: 1; padding-bottom: 1rem; min-width: 0; }
    .ap-row { display: flex; align-items: center; justify-content: space-between; gap: .5rem; padding: .15rem .35rem; border-radius: 8px; }
    .ap-row.clickable { cursor: pointer; }
    .ap-row.clickable:hover { background: color-mix(in srgb, var(--surface-3) 70%, transparent); }
    .ap-step-title { font-size: .88rem; font-weight: 500; color: color-mix(in srgb, var(--text) 85%, transparent); }
    .ap-step.active .ap-step-title { font-weight: 600; color: var(--text); }
    .ap-step.error .ap-step-title { color: var(--bad); font-weight: 600; }
    .ap-meta { display: flex; align-items: center; gap: .45rem; color: var(--muted); font-size: .68rem; font-family: ui-monospace, monospace; }
    .ap-detail { display: grid; grid-template-rows: 0fr; opacity: 0; transition: grid-template-rows .35s ease, opacity .3s ease; }
    .ap-detail.open { grid-template-rows: 1fr; opacity: 1; margin-top: .35rem; }
    .ap-detail > div { overflow: hidden; }
    .ap-detail-inner { font-size: .72rem; color: var(--muted); line-height: 1.45; padding: .25rem 0 .15rem; }
    .ap-detail-inner .ok { color: var(--ok); display: flex; gap: .35rem; align-items: flex-start; margin-bottom: .35rem; }
    .ap-detail-inner .ok svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 2px; }
    .ap-kv { display: grid; grid-template-columns: 72px 1fr; gap: .2rem .5rem; background: color-mix(in srgb, var(--surface-3) 55%, transparent); border: 1px solid var(--border-2); border-radius: 8px; padding: .5rem .6rem; margin-top: .35rem; }
    .ap-kv .k { color: var(--faint); }
    .ap-kv .v { color: var(--text); }
    .ap-code { background: #0f1412; color: #94a3b8; border: 1px solid var(--border-2); border-radius: 8px; padding: .55rem .65rem; margin-top: .35rem; font-family: ui-monospace, monospace; font-size: .68rem; line-height: 1.5; }
    .ap-code .hl { color: #93c5fd; }
    .ap-code .kw { color: #c4b5fd; }
    .ap-code .pulse { color: #e2e8f0; animation: blink 1.2s infinite both; }

    /* Voice orb — the hero control, pinned in the bottom composer (always reachable) */
    .orb { width: 124px; height: 124px; cursor: pointer; border: none; background: transparent; padding: 0; border-radius: 50%; outline: none; position: relative; transition: transform .16s var(--ease-out); }
    .orb::after { content: ""; position: absolute; inset: -18px; border-radius: 50%; background: radial-gradient(closest-side, color-mix(in srgb, var(--orb-2) 44%, transparent), transparent 78%); filter: blur(12px); z-index: -1; animation: orbBreathe 4.8s var(--ease-in-out) infinite; }
    @keyframes orbBreathe { 0%, 100% { transform: scale(1); opacity: .6; } 50% { transform: scale(1.14); opacity: .92; } }
    .orb canvas { width: 100%; height: 100%; display: block; }
    .orb:active { transform: scale(.95); }
    .orb:focus-visible { box-shadow: 0 0 0 4px var(--ring); }
    .status { margin: .35rem 0 .5rem; color: var(--muted); font-size: .85rem; min-height: 1.3em; text-align: center; }
    .status b { color: var(--text); font-weight: 600; }

    /* Claude-style composer box: voice toggle + text + send inside a rounded rectangle */
    .searchbar { display: flex; gap: .35rem; align-items: center; width: 100%; max-width: 700px; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: .4rem .5rem .4rem .45rem; box-shadow: var(--shadow-sm); transition: border-color .18s var(--ease-out), box-shadow .18s var(--ease-out); }
    .searchbar:focus-within { border-color: color-mix(in srgb, var(--primary) 55%, var(--border)); box-shadow: var(--shadow-sm), 0 0 0 4px var(--ring); }
    .searchbar input { flex: 1; min-width: 0; border: none; background: transparent; color: inherit; font-size: 1rem; padding: .6rem .25rem; }
    .searchbar input:focus { outline: none; }
    .searchbar .iconbtn { width: 40px; height: 40px; font-size: 1.05rem; background: transparent; border-color: transparent; }
    .searchbar .iconbtn:hover { background: var(--surface-3); }
    .send { width: 42px; height: 42px; flex: 0 0 auto; border-radius: 50%; border: none; cursor: pointer; font-size: 1rem; color: #fff; background: var(--primary-2); box-shadow: 0 4px 12px color-mix(in srgb, var(--primary) 32%, transparent); transition: transform .14s var(--ease-out), filter .14s var(--ease-out); }
    .send:active { transform: scale(.94); }

    /* Quick-prompt suggestion chips — every chip renders from this one class; states are explicit so
       no chip can ever look different at rest (a stray browser focus ring used to highlight one). */
    .chips { display: flex; flex-wrap: wrap; gap: .55rem; justify-content: center; margin: 1.1rem auto .2rem; max-width: 600px; transition: opacity .25s var(--ease-out); }
    .chips.hide { display: none; }
    .chip { background: var(--accent-soft); border: 1px solid var(--accent-border); color: var(--text); border-radius: 12px; padding: .55rem .95rem; font: inherit; font-size: .85rem; cursor: pointer; box-shadow: var(--shadow-sm); outline: none; transition: transform .15s var(--ease-out), border-color .15s var(--ease-out), background .15s var(--ease-out); }
    .chip:active { transform: scale(.96); }
    .chip:focus { outline: none; }
    .chip:focus-visible { border-color: color-mix(in srgb, var(--primary) 60%, var(--border)); box-shadow: 0 0 0 3px var(--ring); }
    @media (hover: hover) and (pointer: fine) {
      .orb:hover { transform: scale(1.03); }
      .send:hover { filter: brightness(1.06); transform: scale(1.05); }
      .chip:hover { transform: translateY(-2px); border-color: color-mix(in srgb, var(--primary) 55%, var(--border)); background: color-mix(in srgb, var(--primary) 20%, var(--surface)); }
    }

    /* Conversation feed — Claude-style: assistant text is plain with an avatar, user text in a soft bubble */
    .feed { display: flex; flex-direction: column; gap: 1.4rem; }
    .msg { max-width: 100%; }
    .msg.bot { display: flex; gap: .7rem; align-items: flex-start; }
    .msg.bot::before { content: "🌴"; flex: 0 0 auto; width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; font-size: .9rem; color: #fff; background: linear-gradient(135deg, var(--primary), var(--orb-3)); box-shadow: 0 2px 6px color-mix(in srgb, var(--primary) 35%, transparent); margin-top: .1rem; }
    .msg.user { align-self: flex-end; max-width: 82%; }
    .msg .bubble { line-height: 1.62; white-space: pre-wrap; word-wrap: break-word; font-size: .96rem; animation: rise .28s var(--ease-out) both; min-width: 0; }
    .msg.bot .bubble { flex: 1; background: transparent; border: none; box-shadow: none; padding: .15rem 0; border-radius: 0; color: var(--text); }
    .msg.user .bubble { padding: .65rem .95rem; border-radius: 18px; border-bottom-right-radius: 6px; background: var(--surface-3); color: var(--text); border: 1px solid var(--border-2); }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .typing .bubble { color: var(--muted); }
    .dots span { display: inline-block; width: 6px; height: 6px; margin: 0 1px; border-radius: 50%; background: currentColor; opacity: .4; animation: blink 1.2s infinite both; }
    .dots span:nth-child(2) { animation-delay: .2s; } .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,100% { opacity: .25; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-3px); } }

    /* Product cards */
    .grid { display: grid; gap: .7rem; margin: .7rem 0 0; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .card { border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; background: var(--surface); box-shadow: var(--shadow-sm); transition: transform .2s var(--ease-out), box-shadow .2s var(--ease-out), border-color .2s var(--ease-out); }
    /* Stagger product cards as they enter (decorative, never blocks interaction) */
    .grid .card { opacity: 0; transform: translateY(10px); animation: rise .32s var(--ease-out) both; }
    .imgwrap { position: relative; overflow: hidden; height: 120px; background: var(--surface-3); }
    .card img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s var(--ease-out); display: block; }
    @media (hover: hover) and (pointer: fine) {
      .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: color-mix(in srgb, var(--primary) 30%, var(--border)); }
      .card:hover img { transform: scale(1.07); }
    }
    .cardbody { padding: .55rem .65rem; display: flex; flex-direction: column; gap: .3rem; flex: 1; }
    .pname { font-weight: 600; font-size: .85rem; line-height: 1.3; }
    .pname a { color: inherit; text-decoration: none; }
    .pname a:hover { text-decoration: underline; }
    .price { color: var(--primary); font-weight: 700; font-size: .85rem; }
    .desc { font-size: .76rem; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .btn-soft { background: var(--surface-3); color: var(--text); border: 1px solid var(--border-2); padding: .5rem .8rem; border-radius: 12px; cursor: pointer; font: inherit; font-size: .8rem; transition: background .15s ease, transform .14s var(--ease-out); }
    .btn-soft:hover { background: color-mix(in srgb, var(--primary) 12%, var(--surface-3)); }
    .btn-soft:active { transform: scale(.97); }
    .addbtn { margin-top: auto; }
    .gridbar { display: flex; justify-content: flex-end; margin-top: .65rem; }

    /* Cart drawer */
    .scrim { position: fixed; inset: 0; background: rgba(8,16,14,.45); opacity: 0; pointer-events: none; transition: opacity .25s ease; z-index: 45; }
    .scrim.open { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 0; right: 0; height: 100%; width: 360px; max-width: 90vw; background: var(--surface); border-left: 1px solid var(--border); box-shadow: var(--shadow-lg); transform: translateX(100%); transition: transform .42s var(--ease-drawer); z-index: 46; display: flex; flex-direction: column; }
    .drawer.open { transform: none; }
    .drawer header { display: flex; align-items: center; gap: .5rem; padding: 1rem 1.1rem; border-bottom: 1px solid var(--border-2); }
    .drawer header h3 { margin: 0; font-size: 1.05rem; }
    .drawer .body { padding: 1rem 1.1rem; overflow-y: auto; flex: 1; }
    .citem { display: flex; gap: .55rem; align-items: center; margin-bottom: .7rem; }
    .ci-img { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; background: var(--surface-3); flex: 0 0 auto; }
    .ci-noimg { width: 44px; height: 44px; border-radius: 10px; background: var(--surface-3); display: grid; place-items: center; flex: 0 0 auto; }
    .ci-main { flex: 1; min-width: 0; }
    .ci-name { font-size: .85rem; line-height: 1.25; }
    .ci-name a { color: inherit; text-decoration: none; }
    .ci-price { font-size: .78rem; color: var(--primary); font-weight: 600; }
    .qty { display: inline-flex; align-items: center; gap: .15rem; background: var(--surface-3); border-radius: 999px; padding: .1rem; }
    .qty button { width: 1.5rem; height: 1.5rem; padding: 0; border-radius: 50%; background: var(--surface); color: var(--text); border: 1px solid var(--border-2); font-size: .9rem; line-height: 1; cursor: pointer; }
    .qty span { min-width: 1.1rem; text-align: center; font-size: .85rem; }
    .ci-rm { background: transparent; color: var(--faint); border: none; font-size: 1rem; padding: .15rem .3rem; cursor: pointer; }
    .ci-rm:hover { color: var(--bad); }
    .empty { color: var(--muted); font-size: .9rem; text-align: center; padding: 1.5rem .5rem; }
    .empty .big { font-size: 1.9rem; display: block; margin-bottom: .4rem; opacity: .7; }
    .drawer .foot { border-top: 1px solid var(--border-2); padding: 1rem 1.1rem; }
    .totrow { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .7rem; }
    .totrow .lbl { color: var(--muted); font-size: .85rem; }
    .totrow .val { font-family: Poppins; font-weight: 700; font-size: 1.15rem; }
    .drawer label { display: block; font-size: .8rem; color: var(--muted); margin: 0 0 .35rem; }
    .drawer textarea { width: 100%; font-family: inherit; font-size: .9rem; padding: .55rem .7rem; border-radius: 12px; border: 1px solid var(--border); background: var(--surface-2); color: inherit; resize: vertical; }
    .instrlist { display: flex; flex-direction: column; gap: .35rem; margin: .5rem 0; }
    .instr { font-size: .8rem; background: color-mix(in srgb, var(--accent) 12%, var(--surface-2)); border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent); border-radius: 10px; padding: .35rem .55rem; display: flex; gap: .4rem; }
    .instr span { flex: 1; }
    .row { display: flex; gap: .5rem; margin-top: .6rem; }
    .row .btn-soft { flex: 1; text-align: center; }
    .btn-primary { width: 100%; margin-top: .6rem; padding: .75rem; border: none; border-radius: 12px; cursor: pointer; font: inherit; font-weight: 600; color: #fff; background: var(--primary-2); box-shadow: 0 6px 16px color-mix(in srgb, var(--primary) 30%, transparent); transition: filter .15s ease, transform .14s var(--ease-out), box-shadow .15s var(--ease-out); }
    .btn-primary:hover { filter: brightness(1.06); box-shadow: 0 8px 22px color-mix(in srgb, var(--primary) 38%, transparent); }
    .btn-primary:active { transform: scale(.985); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 12px; padding: .7rem; cursor: pointer; font: inherit; }
    .formgrid { display: grid; grid-template-columns: 1fr 1fr; gap: .55rem .6rem; }
    .formgrid .full { grid-column: 1 / -1; }
    .formgrid label { margin: 0 0 .2rem; }
    .formgrid input, .formgrid select, .formgrid textarea { width: 100%; box-sizing: border-box; font: inherit; font-size: .9rem; padding: .5rem .6rem; border-radius: 10px; border: 1px solid var(--border); background: var(--surface-2); color: inherit; }
    .formgrid input:focus, .formgrid select:focus, .formgrid textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 16%, transparent); }
    #checkoutResult { margin: .8rem 0 0; }
    .co-ok { background: color-mix(in srgb, var(--ok) 12%, var(--surface)); border: 1px solid color-mix(in srgb, var(--ok) 40%, transparent); border-radius: 12px; padding: .8rem; font-size: .9rem; }
    .co-ok .pay { display: block; text-align: center; margin-top: .6rem; padding: .65rem; border-radius: 12px; background: var(--primary-2); color: #fff; text-decoration: none; font-weight: 600; }
    .co-bad { background: color-mix(in srgb, var(--bad) 12%, var(--surface)); border: 1px solid color-mix(in srgb, var(--bad) 40%, transparent); border-radius: 12px; padding: .7rem; font-size: .88rem; }
    .langsel { margin-left: auto; font: inherit; font-size: .85rem; padding: .35rem .5rem; border-radius: 999px; border: 1px solid var(--border); background: var(--surface-3); color: var(--text); cursor: pointer; }
    .topbar .langsel + .iconbtn { margin-left: 0; }
    .topbar .cartbtn { margin-left: 0; }
    .budgetrow { display: flex; align-items: center; justify-content: space-between; margin-bottom: .6rem; }
    .budgetrow input { width: 120px; text-align: right; font: inherit; font-size: .9rem; padding: .4rem .55rem; border-radius: 10px; border: 1px solid var(--border); background: var(--surface-2); color: inherit; }
    .budgetrow input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 16%, transparent); }
    .totrow.over .val { color: var(--bad); }
    .budgetwarn { background: color-mix(in srgb, var(--bad) 12%, var(--surface)); border: 1px solid color-mix(in srgb, var(--bad) 38%, transparent); color: var(--text); border-radius: 10px; padding: .5rem .65rem; font-size: .82rem; margin-bottom: .6rem; }

    /* Confirm modal */
    .modal-scrim { position: fixed; inset: 0; background: rgba(8,16,14,.5); display: none; align-items: center; justify-content: center; z-index: 70; padding: 1.2rem; }
    .modal-scrim.open { display: flex; animation: tin .2s ease both; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); max-width: 360px; width: 100%; padding: 1.2rem; }
    .modal h4 { margin: 0 0 .5rem; font-size: 1.05rem; }
    .modal p { margin: 0 0 1rem; color: var(--muted); font-size: .92rem; }
    .modal .actions { display: flex; gap: .5rem; }
    .modal .actions button { flex: 1; }

    /* Toasts */
    .toasts { position: fixed; left: 50%; transform: translateX(-50%); bottom: 1.1rem; display: flex; flex-direction: column; gap: .5rem; z-index: 60; align-items: center; }
    .toast { background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow); border-radius: 12px; padding: .6rem .9rem; font-size: .88rem; display: flex; gap: .5rem; align-items: center; animation: tin .25s ease both; max-width: 88vw; }
    .toast.out { animation: tout .3s ease forwards; }
    .toast .ic { width: 24px; height: 24px; border-radius: 50%; background: color-mix(in srgb, var(--primary) 16%, transparent); color: var(--primary); display: grid; place-items: center; flex: 0 0 auto; }
    @keyframes tin { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    @keyframes tout { to { opacity: 0; transform: translateY(12px); } }

    /* Reduced motion: keep gentle opacity fades, drop positional movement (Emil's a11y guidance) */
    @media (prefers-reduced-motion: reduce) {
      .grid .card, .msg .bubble, .ap-step { animation: fadeOnly .2s ease both !important; }
      .card:hover, .chip:hover, .send:hover, .card:hover img { transform: none !important; }
      .orb::after { animation: none !important; opacity: .7 !important; }
      .drawer { transition-duration: .2s; }
    }
    @keyframes fadeOnly { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="inner">
      <div class="brand"><span class="mark">🌴</span> Kapruka Concierge</div>
      <select id="lang" class="langsel" title="Language" aria-label="Language">
        <option value="en">English</option>
        <option value="si">සිංහල</option>
        <option value="ta">தமிழ்</option>
      </select>
      <button id="cartBtn" type="button" class="iconbtn cartbtn" title="View cart" aria-label="View cart">🛒<span id="cartBadge" class="badge zero">0</span></button>
    </div>
  </div>

  <main>
    <div class="thread">
      <div id="feed" class="feed"></div>
      <div id="chips" class="chips">
        <button type="button" class="chip" data-prompt="Birthday gift for mom under Rs 5000">🎂 Birthday gift for mom</button>
        <button type="button" class="chip" data-prompt="Anniversary flowers delivered to Colombo">💐 Anniversary flowers</button>
        <button type="button" class="chip" data-prompt="Get-well hamper for a friend">🧺 Get-well hamper</button>
        <button type="button" class="chip" data-prompt="Chocolates and a card under Rs 3000">🍫 Chocolates under Rs 3000</button>
      </div>
    </div>
  </main>

  <div id="thinking" class="thinking" aria-hidden="true">
    <div id="agentPlanning" class="thinking-panel"></div>
  </div>

  <footer class="composer">
    <div class="composer-inner">
      <button id="orb" class="orb" type="button" aria-label="Tap to talk to the concierge">
        <canvas id="orbCanvas" width="230" height="230"></canvas>
      </button>
      <p id="status" class="status">Tap to talk, or type your request below</p>
      <form id="searchForm" class="searchbar">
        <button id="speaker" type="button" class="iconbtn" title="Read replies aloud" aria-label="Toggle voice replies">🔈</button>
        <input id="query" type="text" autocomplete="off" placeholder="Who's it for, and what's the occasion?" />
        <button type="submit" class="send" title="Send" aria-label="Send">➤</button>
      </form>
    </div>
  </footer>

  <div id="scrim" class="scrim"></div>
  <aside id="drawer" class="drawer" aria-label="Cart">
    <header>
      <span style="font-size:1.2rem">🛒</span>
      <h3>Your cart</h3>
      <button id="drawerClose" type="button" class="iconbtn" style="margin-left:auto" aria-label="Close">✕</button>
    </header>
    <div class="body">
      <div id="cartItems"></div>
    </div>
    <div class="foot">
      <!-- Cart summary view -->
      <div id="cartView">
        <div class="budgetrow">
          <span class="lbl">Budget (LKR)</span>
          <input id="budgetInput" type="number" min="0" step="100" placeholder="none set" />
        </div>
        <div class="totrow"><span class="lbl">Estimated total</span><span id="cartTotal" class="val">LKR 0</span></div>
        <div id="budgetWarn" class="budgetwarn" style="display:none"></div>
        <label>Notes for the store — hampers, gift-wrap, custom requests</label>
        <div id="instrList" class="instrlist"></div>
        <textarea id="instrInput" rows="2" placeholder="e.g. gift-wrap everything together as one hamper"></textarea>
        <div class="row">
          <button id="addInstr" type="button" class="btn-soft">＋ Add note</button>
          <button id="clearCart" type="button" class="btn-soft">Clear</button>
        </div>
        <button id="checkout" type="button" class="btn-primary">Proceed to checkout →</button>
      </div>

      <!-- Manual checkout form -->
      <form id="checkoutForm" style="display:none">
        <div class="totrow"><span class="lbl">Order total</span><span id="checkoutTotal" class="val">LKR 0</span></div>
        <div class="formgrid">
          <div class="full"><label>Recipient name *</label><input name="rname" required placeholder="Who receives the gift" /></div>
          <div class="full"><label>Recipient phone *</label><input name="rphone" required placeholder="07X XXX XXXX or +9477…" /></div>
          <div class="full"><label>Delivery address *</label><input name="address" required placeholder="No. 46, Pitipana Veediya" /></div>
          <div><label>City *</label><input name="city" required placeholder="Negombo" /></div>
          <div><label>Delivery date *</label><input name="date" type="date" required /></div>
          <div class="full"><label>Address type</label>
            <select name="location_type"><option value="house">House</option><option value="apartment">Apartment</option><option value="office">Office</option><option value="other">Other</option></select>
          </div>
          <div class="full"><label>Your name (sender) *</label><input name="sname" required placeholder="From…" /></div>
          <div class="full"><label>Gift card message</label><textarea name="gift_message" rows="2" maxlength="300" placeholder="Happy birthday, Mom! 🎂"></textarea></div>
          <div class="full"><label>Delivery instructions</label><textarea name="instructions" rows="2" maxlength="250" placeholder="Leave at the front gate, call on arrival…"></textarea></div>
        </div>
        <div id="checkoutResult"></div>
        <button id="placeOrder" type="submit" class="btn-primary">Place order &amp; get pay link</button>
        <button id="backToCart" type="button" class="btn-ghost" style="width:100%;margin-top:.5rem">← Back to cart</button>
      </form>
    </div>
  </aside>

  <div id="modalScrim" class="modal-scrim">
    <div class="modal" role="alertdialog" aria-modal="true">
      <h4 id="modalTitle">Over budget</h4>
      <p id="modalMsg"></p>
      <div class="actions">
        <button id="modalCancel" type="button" class="btn-ghost"></button>
        <button id="modalOk" type="button" class="btn-primary" style="margin-top:0"></button>
      </div>
    </div>
  </div>

  <div id="toasts" class="toasts" aria-live="polite"></div>

  <script>
    // ---------- helpers ----------
    const $ = (id) => document.getElementById(id);
    function escapeHtml(s) { return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
    function escapeAttr(s) { return escapeHtml(s).replace(/"/g, "&quot;"); }
    function stripHtml(html) { const d = document.createElement("div"); d.innerHTML = html; return d.textContent || ""; }
    function priceNum(p) { const n = parseFloat(String(p.price).replace(/[^0-9.]/g, "")); return isNaN(n) ? 0 : n; }
    function fmtMoney(n, cur) { return (cur || "LKR") + " " + Number(n).toLocaleString(); }

    // ---------- toasts ----------
    const toastWrap = $("toasts");
    function showToast(msg, icon) {
      const t = document.createElement("div");
      t.className = "toast";
      t.innerHTML = `<span class="ic">${icon || "✓"}</span><span>${escapeHtml(msg)}</span>`;
      toastWrap.appendChild(t);
      setTimeout(() => { t.classList.add("out"); setTimeout(() => t.remove(), 320); }, 2400);
    }

    // ========== VOICE ORB (canvas visualizer) ==========
    const canvas = $("orbCanvas");
    const ctx = canvas.getContext("2d");
    let orbMode = "idle";          // 'idle' | 'active' (speaking/thinking) | 'listening'
    let energy = 0;                // smoothed amplitude target for the active blob
    let t = 0;
    let analyser = null, audioCtx = null, micStream = null, freqData = null;

    function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    function sizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      const w = rect.width || 230, h = rect.height || 230;
      canvas.width = Math.round(w * dpr); canvas.height = Math.round(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener("resize", sizeCanvas);

    function setOrb(mode) { orbMode = mode; }

    function drawBlob(w, h, cx, cy, active) {
      const base = Math.min(w, h) * 0.27;
      const target = active ? 0.16 + 0.12 * (0.5 + 0.5 * Math.sin(t * 3.2)) : 0.06;
      energy += (target - energy) * 0.08;
      const pts = 90;
      ctx.beginPath();
      for (let i = 0; i <= pts; i++) {
        const a = (i / pts) * Math.PI * 2;
        const r = base * (1 + energy * (
          Math.sin(a * 3 + t * 1.6) * 0.5 +
          Math.sin(a * 5 - t * 1.1) * 0.3 +
          Math.sin(a * 2 + t * 0.7) * 0.2));
        const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      const g = ctx.createRadialGradient(cx - base * 0.35, cy - base * 0.4, base * 0.2, cx, cy, base * 1.5);
      g.addColorStop(0, cssVar("--orb-1") || "#e3a06a");
      g.addColorStop(0.55, cssVar("--orb-2") || "#c9682f");
      g.addColorStop(1, cssVar("--orb-3") || "#9f4f23");
      ctx.fillStyle = g;
      ctx.shadowColor = "rgba(217,119,87,.45)";
      ctx.shadowBlur = 38;
      ctx.fill();
      ctx.shadowBlur = 0;
      // soft inner highlight
      ctx.beginPath();
      ctx.arc(cx - base * 0.28, cy - base * 0.32, base * 0.32, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,.18)";
      ctx.fill();
    }

    function drawBars(w, h, cx, cy) {
      const n = 22, gap = 6, bw = 7;
      const totalW = n * (bw + gap) - gap;
      let x = cx - totalW / 2;
      if (analyser && freqData) analyser.getByteFrequencyData(freqData);
      const maxBar = Math.min(w, h) * 0.62;
      for (let i = 0; i < n; i++) {
        const mirror = Math.abs(i - (n - 1) / 2) / ((n - 1) / 2); // 0 center -> 1 edges
        let v;
        if (analyser && freqData) {
          const idx = Math.floor((i / n) * freqData.length * 0.7);
          v = freqData[idx] / 255;
        } else {
          v = 0.25 + 0.6 * Math.abs(Math.sin(t * 5 + i * 0.55));
        }
        v *= (1 - mirror * 0.45);
        const bh = Math.max(bw, v * maxBar);
        const g = ctx.createLinearGradient(0, cy - bh / 2, 0, cy + bh / 2);
        g.addColorStop(0, cssVar("--orb-1") || "#e3a06a");
        g.addColorStop(1, cssVar("--orb-3") || "#9f4f23");
        ctx.fillStyle = g;
        const y = cy - bh / 2;
        const rr = bw / 2;
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + bw, y, x + bw, y + bh, rr);
        ctx.arcTo(x + bw, y + bh, x, y + bh, rr);
        ctx.arcTo(x, y + bh, x, y, rr);
        ctx.arcTo(x, y, x + bw, y, rr);
        ctx.closePath();
        ctx.fill();
        x += bw + gap;
      }
    }

    function loop() {
      t += 0.016;
      const w = canvas.clientWidth || 230, h = canvas.clientHeight || 230;
      const cx = w / 2, cy = h / 2;
      ctx.clearRect(0, 0, w, h);
      if (orbMode === "listening") drawBars(w, h, cx, cy);
      else drawBlob(w, h, cx, cy, orbMode === "active");
      requestAnimationFrame(loop);
    }
    sizeCanvas(); loop();

    async function startAnalyser() {
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const src = audioCtx.createMediaStreamSource(micStream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 64; analyser.smoothingTimeConstant = 0.75;
        freqData = new Uint8Array(analyser.frequencyBinCount);
        src.connect(analyser);
      } catch (_) { analyser = null; }
    }
    function stopAnalyser() {
      try { if (micStream) micStream.getTracks().forEach(tr => tr.stop()); } catch (_) {}
      try { if (audioCtx) audioCtx.close(); } catch (_) {}
      analyser = null; freqData = null; micStream = null; audioCtx = null;
    }

    // ---------- status ----------
    const statusEl = $("status");
    const DEFAULT_STATUS = "Tap to talk, or type your request below";
    function setStatus(html) { statusEl.innerHTML = html; }
    function idleStatus() { if (orbMode !== "listening") { setOrb("idle"); setStatus(DEFAULT_STATUS); } }

    // ========== product rendering ==========
    const batches = {};
    let batchSeq = 0;
    function renderProducts(products) {
      if (!Array.isArray(products) || !products.length) return "";
      const id = ++batchSeq;
      batches[id] = products;
      const cards = products.map((p, i) => {
        const img = p.image
          ? `<div class="imgwrap"><img src="${escapeAttr(p.image)}" alt="" loading="lazy" onerror="this.closest('.imgwrap').style.display='none'" /></div>` : "";
        const priceText = (p.price !== null && p.price !== undefined && p.price !== "") ? ((p.currency ? p.currency + " " : "") + p.price) : "";
        const price = priceText ? `<div class="price">${escapeHtml(priceText)}</div>` : "";
        const name = escapeHtml(p.name || "Product");
        const title = p.url ? `<a href="${escapeAttr(p.url)}" target="_blank" rel="noopener">${name}</a>` : name;
        const desc = p.description ? `<div class="desc">${escapeHtml(p.description)}</div>` : "";
        const add = `<button type="button" class="btn-soft addbtn" data-add="${id}" data-i="${i}">🛒 Add to cart</button>`;
        const delay = Math.min(i, 8) * 45; // staggered entrance, capped so the list never feels slow
        return `<div class="card" style="animation-delay:${delay}ms">${img}<div class="cardbody"><div class="pname">${title}</div>${price}${desc}${add}</div></div>`;
      }).join("");
      const all = `<div class="gridbar"><button type="button" class="btn-soft" data-addall="${id}">🛒 Add all to cart</button></div>`;
      return `<div class="grid">${cards}</div>${all}`;
    }

    // ========== cart ==========
    const cart = [];
    const instructions = [];
    let lastSuggestions = [];
    const cartItemsEl = $("cartItems"), cartBadgeEl = $("cartBadge"), cartTotalEl = $("cartTotal"), instrListEl = $("instrList");

    function cartKey(p) { return (p.url || "").trim().toLowerCase() || String(p.name || "").trim().toLowerCase(); }
    function bumpBadge() { cartBadgeEl.classList.add("bump"); setTimeout(() => cartBadgeEl.classList.remove("bump"), 220); }
    function cartSubtotal() { return cart.reduce((s, c) => s + priceNum(c) * c.qty, 0); }

    // ----- budget -----
    let budget = null; // null = no budget set
    const budgetInput = $("budgetInput");
    function setBudget(n, fromUser) {
      budget = (n && n > 0) ? n : null;
      if (!fromUser) budgetInput.value = budget != null ? budget : "";
      renderCart();
    }
    budgetInput.addEventListener("input", () => {
      const v = parseFloat(budgetInput.value);
      budget = (!isNaN(v) && v > 0) ? v : null;
      renderCart();
    });
    // Pull a budget out of free text, e.g. "budget around 5000", "under Rs 7,500".
    function parseBudget(text) {
      const t = String(text || "").toLowerCase();
      let m = t.match(/budget[^0-9]{0,20}(\d[\d,]{1,})/) ||
              t.match(/(?:rs\.?|lkr|rupees)\s*(\d[\d,]{1,})/) ||
              t.match(/(\d[\d,]{1,})\s*(?:lkr|rs\b|rupees)/) ||
              t.match(/(?:around|under|below|upto|up to|max|maximum|within)\s*(\d[\d,]{2,})/);
      if (m) { const n = parseFloat(m[1].replace(/,/g, "")); if (!isNaN(n) && n >= 100) return n; }
      return null;
    }

    function addToCartRaw(product, qty) {
      if (!product || !product.name) return;
      qty = Math.max(1, qty || 1);
      const key = cartKey(product);
      const existing = cart.find(c => cartKey(c) === key);
      if (existing) existing.qty += qty;
      else cart.push({ id: product.id, name: product.name, price: product.price, currency: product.currency || "LKR", url: product.url, image: product.image, qty });
    }

    // Budget-enforced add for one or more products. Asks for confirmation
    // (hard client-side gate) when the additions would exceed the budget.
    async function addItems(products, quiet) {
      products = (products || []).filter(p => p && p.name);
      if (!products.length) return;
      const addition = products.reduce((s, p) => s + priceNum(p) * (p.qty || 1), 0);
      const sub = cartSubtotal();
      if (budget != null && sub + addition > budget) {
        const label = products.length === 1 ? `“${products[0].name}”` : `these ${products.length} items`;
        const ok = await confirmModal(
          "Over your budget",
          `Adding ${label} brings your total to ${fmtMoney(sub + addition)} — ${fmtMoney(sub + addition - budget)} over your ${fmtMoney(budget)} budget. Add anyway, or keep within budget?`,
          "Add anyway", "Keep within budget");
        if (!ok) { showToast("Skipped to stay within budget", "💸"); return; }
      }
      products.forEach(p => addToCartRaw(p, p.qty || 1));
      renderCart(); bumpBadge();
      if (!quiet) showToast(products.length === 1 ? `Added “${products[0].name}”` : `Added ${products.length} items`, "🛒");
    }

    // ----- confirm modal -----
    const modalScrim = $("modalScrim");
    let modalResolve = null;
    function confirmModal(title, msg, okText, cancelText) {
      $("modalTitle").textContent = title;
      $("modalMsg").textContent = msg;
      $("modalOk").textContent = okText || "OK";
      $("modalCancel").textContent = cancelText || "Cancel";
      modalScrim.classList.add("open");
      return new Promise(res => { modalResolve = res; });
    }
    function closeModal(val) { modalScrim.classList.remove("open"); if (modalResolve) { modalResolve(val); modalResolve = null; } }
    $("modalOk").addEventListener("click", () => closeModal(true));
    $("modalCancel").addEventListener("click", () => closeModal(false));
    modalScrim.addEventListener("click", (e) => { if (e.target === modalScrim) closeModal(false); });

    function renderCart() {
      const count = cart.reduce((n, c) => n + c.qty, 0);
      cartBadgeEl.textContent = count;
      cartBadgeEl.classList.toggle("zero", count === 0);
      if (!cart.length) {
        cartItemsEl.innerHTML = '<div class="empty"><span class="big">🎁</span>Your cart is empty.<br>Add items from the suggestions, or just ask me to.</div>';
      } else {
        cartItemsEl.innerHTML = cart.map((c, i) => {
          const name = escapeHtml(c.name);
          const title = c.url ? `<a href="${escapeAttr(c.url)}" target="_blank" rel="noopener">${name}</a>` : name;
          const thumb = c.image ? `<img class="ci-img" src="${escapeAttr(c.image)}" alt="" onerror="this.outerHTML='<div class=&quot;ci-noimg&quot;>🎁</div>'" />` : `<div class="ci-noimg">🎁</div>`;
          const line = c.price ? `<div class="ci-price">${escapeHtml(fmtMoney(priceNum(c) * c.qty, c.currency))}</div>` : "";
          return `<div class="citem">${thumb}<div class="ci-main"><div class="ci-name">${title}</div>${line}</div>
            <div class="qty"><button type="button" data-dec="${i}">−</button><span>${c.qty}</span><button type="button" data-inc="${i}">+</button></div>
            <button type="button" class="ci-rm" data-rm="${i}" title="Remove">✕</button></div>`;
        }).join("");
      }
      const total = cartSubtotal();
      const cur = (cart[0] && cart[0].currency) || "LKR";
      cartTotalEl.textContent = fmtMoney(total, cur);
      const over = budget != null && total > budget;
      cartTotalEl.parentElement.classList.toggle("over", over);
      const warn = $("budgetWarn");
      if (over) { warn.style.display = ""; warn.textContent = `⚠ ${fmtMoney(total - budget, cur)} over your ${fmtMoney(budget, cur)} budget.`; }
      else warn.style.display = "none";
      renderInstructions();
    }
    function renderInstructions() {
      instrListEl.innerHTML = instructions.map((tx, i) =>
        `<div class="instr"><span>📝 ${escapeHtml(tx)}</span><button type="button" class="ci-rm" data-rmnote="${i}" title="Remove">✕</button></div>`).join("");
    }
    async function applyCartActions(actions) {
      if (!Array.isArray(actions)) return;
      for (const a of actions) {
        if (!a) continue;
        if (a.action === "add" && Array.isArray(a.products)) await addItems(a.products, true);
        else if (a.action === "clear") { cart.length = 0; showToast("Cart cleared", "🗑️"); }
        else if (a.action === "remove" && Array.isArray(a.items)) {
          a.items.map(n => n - 1).sort((x, y) => y - x).forEach(idx => { if (idx >= 0 && idx < cart.length) cart.splice(idx, 1); });
          showToast("Removed from cart", "🛒");
        } else if (a.action === "instruction" && a.text) { instructions.push(a.text); showToast("Note saved", "📝"); }
      }
      renderCart(); bumpBadge();
    }

    // drawer open/close
    const drawer = $("drawer"), scrim = $("scrim");
    function openCart() { drawer.classList.add("open"); scrim.classList.add("open"); if (typeof showCartView === "function") showCartView(); }
    function closeCart() { drawer.classList.remove("open"); scrim.classList.remove("open"); }
    $("cartBtn").addEventListener("click", openCart);
    $("drawerClose").addEventListener("click", closeCart);
    scrim.addEventListener("click", closeCart);

    drawer.addEventListener("click", (e) => {
      const inc = e.target.closest("[data-inc]"), dec = e.target.closest("[data-dec]");
      const rm = e.target.closest("[data-rm]"), rmnote = e.target.closest("[data-rmnote]");
      if (inc) { cart[+inc.dataset.inc].qty++; renderCart(); }
      else if (dec) { const i = +dec.dataset.dec; cart[i].qty--; if (cart[i].qty <= 0) cart.splice(i, 1); renderCart(); }
      else if (rm) { cart.splice(+rm.dataset.rm, 1); renderCart(); }
      else if (rmnote) { instructions.splice(+rmnote.dataset.rmnote, 1); renderInstructions(); }
    });
    $("addInstr").addEventListener("click", () => { const el = $("instrInput"); const tx = el.value.trim(); if (!tx) return; instructions.push(tx); el.value = ""; renderInstructions(); showToast("Note saved", "📝"); });
    $("clearCart").addEventListener("click", () => { if (!cart.length) return; cart.length = 0; renderCart(); showToast("Cart cleared", "🗑️"); });
    // ---- manual checkout (calls kapruka_create_order directly) ----
    const cartView = $("cartView"), checkoutForm = $("checkoutForm");
    function idFromUrl(u) { const m = String(u || "").match(/\/kid\/([^/?#]+)/); return m ? m[1] : null; }

    function showCheckout() {
      if (!cart.length) { showToast("Your cart is empty", "🛒"); return; }
      $("checkoutTotal").textContent = cartTotalEl.textContent;
      // prefill delivery instructions from saved notes
      const f = checkoutForm;
      if (instructions.length && !f.instructions.value) f.instructions.value = instructions.join("; ");
      // sensible min date = today
      const today = new Date(); today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
      f.date.min = today.toISOString().slice(0, 10);
      $("checkoutResult").innerHTML = "";
      cartView.style.display = "none";
      checkoutForm.style.display = "";
    }
    function showCartView() { checkoutForm.style.display = "none"; cartView.style.display = ""; }

    $("checkout").addEventListener("click", showCheckout);
    $("backToCart").addEventListener("click", showCartView);

    checkoutForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!cart.length) { showToast("Your cart is empty", "🛒"); return; }
      const f = checkoutForm;
      const items = [];
      for (const c of cart) {
        const pid = c.id || idFromUrl(c.url);
        if (!pid) { $("checkoutResult").innerHTML = `<div class="co-bad">Couldn't find a product ID for “${escapeHtml(c.name)}”. Please remove it and re-add it from the suggestions.</div>`; return; }
        items.push({ product_id: pid, quantity: c.qty });
      }
      const params = {
        cart: items,
        recipient: { name: f.rname.value.trim(), phone: f.rphone.value.trim() },
        delivery: { address: f.address.value.trim(), city: f.city.value.trim(), date: f.date.value, location_type: f.location_type.value },
        sender: { name: f.sname.value.trim() },
        currency: (cart[0] && cart[0].currency) || "LKR",
        response_format: "json",
      };
      if (f.instructions.value.trim()) params.delivery.instructions = f.instructions.value.trim();
      if (f.gift_message.value.trim()) params.gift_message = f.gift_message.value.trim();

      const btn = $("placeOrder");
      btn.disabled = true; btn.textContent = "Placing order…";
      $("checkoutResult").innerHTML = "";
      try {
        const res = await fetch("/api/tool", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: "kapruka_create_order", arguments: { params } }),
        });
        const data = await res.json();
        let order = null;
        try { order = JSON.parse(data.output); } catch (_) {}
        if (data.ok && order && order.checkout_url) {
          const s = order.summary || {};
          const tot = s.grand_total != null ? fmtMoney(s.grand_total, s.currency) : "";
          $("checkoutResult").innerHTML =
            `<div class="co-ok"><strong>✅ Order ready!</strong>` +
            (order.order_ref ? `<div>Ref: ${escapeHtml(order.order_ref)}</div>` : "") +
            (tot ? `<div>Grand total: <strong>${escapeHtml(tot)}</strong>${s.delivery_fee != null ? ` (incl. ${escapeHtml(fmtMoney(s.delivery_fee, s.currency))} delivery)` : ""}</div>` : "") +
            `<a class="pay" href="${escapeAttr(order.checkout_url)}" target="_blank" rel="noopener">Open secure checkout & pay →</a>` +
            (order.expires_at ? `<div style="color:var(--muted);font-size:.78rem;margin-top:.4rem">Link expires ${escapeHtml(new Date(order.expires_at).toLocaleString())}</div>` : "") +
            `</div>`;
          showToast("Order created — open the pay link", "✅");
        } else {
          const msg = (data.output && String(data.output)) || (data.error && String(data.error)) || "Order could not be created.";
          $("checkoutResult").innerHTML = `<div class="co-bad"><strong>Couldn't place the order.</strong><br>${escapeHtml(msg.slice(0, 400))}</div>`;
        }
      } catch (err) {
        $("checkoutResult").innerHTML = `<div class="co-bad">❌ ${escapeHtml(String(err))}</div>`;
      } finally {
        btn.disabled = false; btn.textContent = "Place order & get pay link";
      }
    });
    renderCart();

    // ========== chat / feed ==========
    const feed = $("feed");
    const conversation = [];
    let awaitingAnswers = false;
    // Replace the most recent user turn with its English translation so the
    // model (which runs in English) keeps a coherent history across turns.
    function setLastUserEnglish(en) {
      for (let i = conversation.length - 1; i >= 0; i--) {
        if (conversation[i].role === "user") { conversation[i].content = en; break; }
      }
    }

    feed.addEventListener("click", (e) => {
      const add = e.target.closest("[data-add]"), all = e.target.closest("[data-addall]");
      if (add) { const list = batches[add.dataset.add]; if (list) addItems([list[+add.dataset.i]]); }
      else if (all) { const list = batches[all.dataset.addall]; if (list) addItems(list); }
    });

    function addBubble(role, html, extraClass) {
      const wrap = document.createElement("div");
      wrap.className = "msg " + role + (extraClass ? " " + extraClass : "");
      wrap.innerHTML = `<div class="bubble">${html}</div>`;
      feed.appendChild(wrap);
      wrap.scrollIntoView({ behavior: "smooth", block: "nearest" });
      return wrap;
    }

    // ========== agent planning timeline (vanilla port of AgentPlanning) ==========
    const ICONS = {
      search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',
      file: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>',
      brain: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5a3 3 0 1 0-5.995.125A4 4 0 0 0 6 13h12a4 4 0 0 0-2-7.5 3 3 0 0 0-5.995-.125"/><path d="M8 17v3"/><path d="M16 17v3"/></svg>',
      check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>',
      spin: '<svg class="ap-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>',
      chevDown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>',
      chevRight: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>',
      globe: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
      cart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>',
      code: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 18 6-6-6-6"/><path d="m8 6-6 6 6 6"/></svg>',
    };
    const AgentPlanning = (function () {
      const root = $("agentPlanning");
      let steps = [], mainOpen = true, expanded = {}, timers = [];
      function clearTimers() { timers.forEach(clearTimeout); timers = []; }
      function statusIcon(s, icon) {
        if (s === "success") return ICONS.check;
        if (s === "active") return ICONS.spin;
        return icon || '<span style="width:6px;height:6px;border-radius:50%;background:currentColor;display:block"></span>';
      }
      function render() {
        if (!root) return;
        const hasActive = steps.some(s => s.status === "active");
        const allSuccess = steps.length && steps.every(s => s.status === "success");
        const headIcon = hasActive ? ICONS.spin : allSuccess ? ICONS.check : ICONS.brain;
        root.innerHTML = `
          <div class="ap-card">
            <div class="ap-head ${mainOpen ? "open" : ""}" data-ap-toggle="main">
              <div class="ap-head-left"><span class="ap-chev">${headIcon}</span><span class="ap-title">Concierge is planning</span></div>
              <span class="ap-chev">${mainOpen ? ICONS.chevDown : ICONS.chevRight}</span>
            </div>
            <div class="ap-body ${mainOpen ? "open" : ""}"><div><div class="ap-steps">
              ${steps.map((s, i) => `
                <div class="ap-step ${s.status}" style="animation-delay:${i * 70}ms">
                  <div class="ap-step-col"><div class="ap-icon ${s.status}">${statusIcon(s.status, s.icon)}</div></div>
                  <div class="ap-main">
                    <div class="ap-row ${s.detail ? "clickable" : ""}" data-ap-step="${s.id}">
                      <span class="ap-step-title">${escapeHtml(s.title)}</span>
                      <span class="ap-meta">${s.duration ? `<span>${escapeHtml(s.duration)}</span>` : ""}${s.detail ? (expanded[s.id] ? ICONS.chevDown : ICONS.chevRight) : ""}</span>
                    </div>
                    ${s.detail ? `<div class="ap-detail ${expanded[s.id] ? "open" : ""}"><div><div class="ap-detail-inner">${s.detail}</div></div></div>` : ""}
                  </div>
                </div>`).join("")}
            </div></div></div>
          </div>`;
        root.querySelector("[data-ap-toggle=main]")?.addEventListener("click", () => { mainOpen = !mainOpen; render(); });
        root.querySelectorAll("[data-ap-step]").forEach(el => {
          el.addEventListener("click", () => {
            const id = el.getAttribute("data-ap-step");
            const step = steps.find(x => x.id === id);
            if (!step?.detail) return;
            expanded[id] = !expanded[id];
            render();
          });
        });
      }
      function defaultSteps(lang) {
        const langName = LANG_NAMES[lang] || "English";
        const translate = lang && lang !== "en";
        return [
          { id: "understand", title: translate ? `Understand your request (${langName})` : "Understand your request", status: "active", duration: "...", icon: ICONS.search,
            detail: translate
              ? `<div class="ok">${ICONS.check}<span>Translating to English for the concierge</span></div><div class="ap-kv"><span class="k">Language</span><span class="v">${escapeHtml(langName)}</span><span class="k">Pipeline</span><span class="v">Langbly → NIM</span></div>`
              : `<div class="ok">${ICONS.check}<span>Parsing occasion, recipient and budget from your message</span></div>` },
          { id: "search", title: "Search Kapruka catalog", status: "pending", icon: ICONS.cart,
            detail: `<div>Running <span class="hl">kapruka_search_products</span> for cakes, flowers, hampers and more.</div><div class="ap-code"><span class="kw">agent</span> → <span class="hl">MCP tools</span> → product matches</div>` },
          { id: "rank", title: "Pick the best matches", status: "pending", icon: ICONS.brain,
            detail: `<div class="ap-code"><span class="kw">rank</span> by occasion fit, budget and delivery<br><span class="pulse">▸ scoring suggestions…</span></div>` },
          { id: "reply", title: translate ? `Prepare reply in ${langName}` : "Prepare your reply", status: "pending", icon: ICONS.code,
            detail: translate ? `<div>Translate answer back via Langbly, then synthesize voice via CAMB.AI.</div>` : `<div>Formatting product cards and concierge summary.</div>` },
        ];
      }
      function setStatus(id, status, duration) {
        const s = steps.find(x => x.id === id);
        if (!s) return;
        s.status = status;
        if (duration) s.duration = duration;
        render();
      }
      function advance(id, nextId) {
        setStatus(id, "success");
        if (nextId) setStatus(nextId, "active", "...");
      }
      function start(lang) {
        clearTimers();
        steps = defaultSteps(lang);
        expanded = { understand: true };
        mainOpen = true;
        render();
        timers.push(setTimeout(() => advance("understand", "search"), 900));
        timers.push(setTimeout(() => advance("search", "rank"), 2800));
        timers.push(setTimeout(() => advance("rank", "reply"), 5200));
      }
      function finish() {
        clearTimers();
        steps.forEach(s => { s.status = "success"; if (s.duration === "...") s.duration = ""; });

      }
      function stop() { clearTimers(); if (root) root.innerHTML = ""; steps = []; }
      return { start, finish, stop, setStatus };
    })();

    const thinkingEl = $("thinking");
    function showThinking() { thinkingEl.classList.add("on"); AgentPlanning.start(currentLang); }
    function hideThinking() { AgentPlanning.finish(); setTimeout(() => { thinkingEl.classList.remove("on"); AgentPlanning.stop(); }, 280); }

    async function callSearch(allowQuestions) {
      setOrb("active"); setStatus("<b>Thinking…</b>");
      showThinking();
      const typing = addBubble("bot", '<span class="dots"><span></span><span></span><span></span></span>', "typing");
      try {
        const res = await fetch("/api/search", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: conversation, allow_questions: allowQuestions, suggestions: lastSuggestions, cart: cart.map(c => ({ name: c.name, qty: c.qty, price: c.price, currency: c.currency })), instructions, language: currentLang }),
        });
        const data = await res.json();
        typing.remove();
        // The backend runs in English; keep the conversation history English so
        // follow-ups stay coherent, but show/speak the user's own language.
        if (data.user_en) setLastUserEnglish(data.user_en);
        if (data.ok && data.needs_input) {
          awaitingAnswers = true;
          const shown = (data.questions_local && data.questions_local.length) ? data.questions_local : (data.questions || []);
          const qs = shown.map(q => "• " + escapeHtml(q)).join("<br>");
          const text = escapeHtml(uiText("ask")) + "<br>" + qs + "<br><br><span style='color:var(--muted)'>" + escapeHtml(uiText("skip")) + "</span>";
          addBubble("bot", text);
          conversation.push({ role: "assistant", content: "Clarifying questions: " + (data.questions || []).join(" ") });
          speak(stripHtml(text)); idleStatus();
          return;
        }
        if (data.ok) {
          if (Array.isArray(data.cart_actions) && data.cart_actions.length) await applyCartActions(data.cart_actions);
          const display = data.answer_local || data.answer || "";
          const summary = display ? escapeHtml(display) : "";
          if (Array.isArray(data.products) && data.products.length) lastSuggestions = data.products;
          const cards = renderProducts(data.products);
          const empty = (!cards && !summary && !(data.cart_actions || []).length) ? "I couldn't find matching products — try giving me more detail." : "";
          addBubble("bot", (summary || empty) + cards);
          if (data.answer) { conversation.push({ role: "assistant", content: data.answer }); speak(display); }
          idleStatus();
        } else {
          addBubble("bot", "⚠️ Something went wrong:<br><pre style='white-space:pre-wrap'>" + escapeHtml(JSON.stringify(data, null, 2)) + "</pre>");
          idleStatus();
        }
      } catch (err) {
        typing.remove();
        addBubble("bot", "❌ Request failed: " + escapeHtml(String(err)));
        idleStatus();
      } finally {
        hideThinking();
      }
    }

    // ========== language ==========
    const LANG_CODES = { en: "en-US", si: "si-LK", ta: "ta-LK" };
    const LANG_NAMES = { en: "English", si: "Sinhala", ta: "Tamil" };
    const UI_TEXT = {
      en: { ask: "To pick the best option, could you tell me a bit more?", skip: 'Just reply here, or say "skip".' },
      si: { ask: "හොඳම තේරීම කරන්න, ටිකක් වැඩිදුර කියන්න පුළුවන්ද?", skip: 'මෙතන පිළිතුරු දෙන්න, නැත්නම් "skip" කියන්න.' },
      ta: { ask: "சிறந்ததைத் தேர்ந்தெடுக்க, இன்னும் சற்று சொல்ல முடியுமா?", skip: 'இங்கே பதிலளிக்கவும், அல்லது "skip" எனச் சொல்லவும்.' },
    };
    function uiText(key) { return (UI_TEXT[currentLang] || UI_TEXT.en)[key]; }
    let currentLang = "en";
    const langSel = $("lang");
    langSel.addEventListener("change", () => {
      currentLang = langSel.value;
      if (recog) { try { recog.lang = LANG_CODES[currentLang] || "en-US"; } catch (_) {} }
      showToast("Language: " + LANG_NAMES[currentLang], "🌐");
    });

    const form = $("searchForm"), queryInput = $("query");
    const chipsEl = $("chips");
    function hideChips() { if (chipsEl) chipsEl.classList.add("hide"); }
    function sendText(text) {
      text = (text || "").trim();
      if (!text) return;
      hideChips();
      const b = parseBudget(text);
      if (b) setBudget(b);
      queryInput.value = "";
      addBubble("user", escapeHtml(text));
      conversation.push({ role: "user", content: text });
      const proceed = awaitingAnswers; awaitingAnswers = false;
      callSearch(!proceed);
    }
    form.addEventListener("submit", (e) => { e.preventDefault(); sendText(queryInput.value); });
    // Quick-prompt chips: tap to send a ready-made request.
    chipsEl?.addEventListener("click", (e) => {
      const chip = e.target.closest("[data-prompt]");
      if (chip) sendText(chip.dataset.prompt);
    });

    // ========== voice: speech-to-text (drives the orb) ==========
    const orbBtn = $("orb");
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recog = null, listening = false;
    if (SR) {
      recog = new SR(); recog.lang = LANG_CODES[currentLang] || "en-US"; recog.interimResults = true; recog.continuous = false;
      let finalText = "";
      recog.onstart = () => { listening = true; finalText = ""; setOrb("listening"); setStatus("<b>Listening…</b> speak now"); startAnalyser(); };
      recog.onerror = (ev) => { setStatus("Mic error: " + escapeHtml(ev.error)); };
      recog.onresult = (ev) => {
        let interim = "";
        for (let i = ev.resultIndex; i < ev.results.length; i++) {
          const tr = ev.results[i][0].transcript;
          if (ev.results[i].isFinal) finalText += tr; else interim += tr;
        }
        queryInput.value = (finalText + interim).trim();
      };
      recog.onend = () => {
        listening = false; stopAnalyser(); setOrb("idle");
        const said = queryInput.value.trim();
        if (said) sendText(said); else idleStatus();
      };
      orbBtn.addEventListener("click", () => { if (listening) recog.stop(); else { stopSpeaking(); try { recog.start(); } catch (_) {} } });
    } else {
      orbBtn.addEventListener("click", () => showToast("Voice input isn't supported in this browser — please type instead.", "🎤"));
    }

    // ========== voice: text-to-speech (orb pulses while speaking) ==========
    const speakerBtn = $("speaker");
    let ttsOn = false;
    const synth = window.speechSynthesis;
    let voicesCache = [];
    const noVoiceWarned = {};
    function loadVoices() { try { voicesCache = synth.getVoices() || []; } catch (_) {} }
    if (synth) {
      loadVoices();
      synth.addEventListener && synth.addEventListener("voiceschanged", loadVoices);
    }
    // Find a voice whose language matches the chosen one (e.g. "si" -> si-LK).
    function pickVoice(lang) {
      if (!voicesCache.length) loadVoices();
      const full = (LANG_CODES[lang] || "en-US").toLowerCase();
      const base = lang.toLowerCase();
      return voicesCache.find(v => (v.lang || "").toLowerCase() === full)
          || voicesCache.find(v => (v.lang || "").toLowerCase().startsWith(base + "-"))
          || voicesCache.find(v => (v.lang || "").toLowerCase() === base)
          || null;
    }
    let currentAudio = null;
    function stopSpeaking() {
      try { if (synth) synth.cancel(); } catch (_) {}
      if (currentAudio) { try { currentAudio.pause(); } catch (_) {} currentAudio = null; }
    }
    // Browsers have no Sinhala/Tamil voices, so synthesize those server-side via
    // CAMB.AI and play the returned MP3. English stays on the instant native voice.
    async function speakRemote(text) {
      try {
        const res = await fetch("/api/tts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: String(text).slice(0, 600), lang: currentLang }),
        });
        if (!res.ok) throw new Error("tts " + res.status);
        const url = URL.createObjectURL(await res.blob());
        stopSpeaking();
        const audio = new Audio(url);
        currentAudio = audio;
        audio.onplay = () => { if (orbMode !== "listening") { setOrb("active"); setStatus("<b>Speaking…</b>"); } };
        const done = () => { URL.revokeObjectURL(url); if (currentAudio === audio) currentAudio = null; idleStatus(); };
        audio.onended = done; audio.onerror = done;
        await audio.play();
      } catch (_) {
        speakLocal(text); // fall back to whatever the browser can manage
      }
    }
    function speakLocal(text) {
      if (!synth) return;
      try {
        synth.cancel();
        const u = new SpeechSynthesisUtterance(String(text).slice(0, 600));
        const v = pickVoice(currentLang);
        if (v) { u.voice = v; u.lang = v.lang; }
        else {
          u.lang = LANG_CODES[currentLang] || "en-US";
          if (currentLang !== "en" && !noVoiceWarned[currentLang]) {
            noVoiceWarned[currentLang] = true;
            showToast("Couldn't load a " + LANG_NAMES[currentLang] + " voice. Replies still appear as text.", "🔇");
          }
        }
        u.onstart = () => { if (orbMode !== "listening") { setOrb("active"); setStatus("<b>Speaking…</b>"); } };
        u.onend = () => idleStatus();
        synth.speak(u);
      } catch (_) {}
    }
    function speak(text) {
      if (!ttsOn || !text) return;
      if (currentLang !== "en") return void speakRemote(text);
      speakLocal(text);
    }
    // Speech output works even without a native voice (CAMB.AI handles si/ta),
    // so the toggle is always available.
    speakerBtn.addEventListener("click", () => {
      ttsOn = !ttsOn; speakerBtn.textContent = ttsOn ? "🔊" : "🔈"; speakerBtn.classList.toggle("on", ttsOn);
      speakerBtn.title = ttsOn ? "Voice replies on" : "Voice replies off";
      showToast(ttsOn ? "Voice replies on" : "Voice replies off", "🔊");
      if (!ttsOn) stopSpeaking();
    });

    // Greeting
    addBubble("bot", "Hi there! 🎁 Tell me who you're shopping for and the occasion — a birthday, an anniversary, a get-well basket, condolence flowers, anything at all. Tap the orb to talk to me, and I'll happily add things to your cart.");
  </script>
</body>
</html>
