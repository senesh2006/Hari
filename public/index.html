<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kapruka MCP Status</title>
  <!-- Inline favicon so the browser never 404s on /favicon.ico -->
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'&gt;&lt;text y='14' font-size='14'&gt;🌴&lt;/text&gt;&lt;/svg&gt;" />
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      max-width: 640px; margin: 6vh auto; padding: 0 1.25rem; line-height: 1.5;
    }
    h1 { margin-bottom: .25rem; }
    .sub { color: #888; margin-top: 0; }
    button {
      font-size: 1rem; padding: .6rem 1.1rem; border-radius: .5rem;
      border: 1px solid #8884; cursor: pointer; background: #2563eb; color: #fff;
    }
    button:disabled { opacity: .6; cursor: progress; }
    .status { margin-top: 1.5rem; padding: 1rem 1.25rem; border-radius: .6rem; border: 1px solid #8883; }
    .ok { background: #16a34a22; border-color: #16a34a; }
    .fail { background: #dc262622; border-color: #dc2626; }
    .pending { background: #f59e0b22; border-color: #f59e0b; }
    pre { overflow-x: auto; background: #8881; padding: .75rem; border-radius: .5rem; }
    code { font-size: .9rem; }
    .summary { white-space: pre-wrap; margin: .25rem 0 1rem; }
    .grid {
      display: grid; gap: 1rem; margin: 1rem 0;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }
    .card {
      border: 1px solid #8883; border-radius: .6rem; overflow: hidden;
      display: flex; flex-direction: column; background: #8881;
    }
    .card img { width: 100%; height: 150px; object-fit: cover; background: #8882; }
    .cardbody { padding: .6rem .7rem; display: flex; flex-direction: column; gap: .35rem; }
    .pname { font-weight: 600; font-size: .95rem; line-height: 1.25; }
    .pname a { color: inherit; text-decoration: none; }
    .pname a:hover { text-decoration: underline; }
    .price { color: #16a34a; font-weight: 700; }
    .desc { font-size: .8rem; color: #888; }
  </style>
</head>
<body>
  <h1>🌴 Kapruka MCP Status</h1>
  <p class="sub">Live health check for <code>https://mcp.kapruka.com/mcp</code></p>

  <button id="run">Run health check</button>

  <div id="status" class="status pending">Click “Run health check” to test the MCP server.</div>

  <hr style="margin: 2.5rem 0; border: none; border-top: 1px solid #8883;" />

  <h2>🔎 AI product search</h2>
  <p class="sub">Describe what you want — NVIDIA NIM searches Kapruka for you.</p>
  <form id="searchForm" style="display:flex; gap:.5rem; flex-wrap:wrap;">
    <input id="query" type="text" style="flex:1; min-width:240px; font-size:1rem; padding:.6rem .75rem; border-radius:.5rem; border:1px solid #8884;"
           placeholder="e.g. birthday gift for mom under 5000 LKR" />
    <button type="submit">Search</button>
  </form>
  <div id="result" class="status pending" style="display:none;"></div>

  <script>
    const btn = document.getElementById("run");
    const box = document.getElementById("status");

    async function check() {
      btn.disabled = true;
      box.className = "status pending";
      box.textContent = "Checking…";
      try {
        const res = await fetch("/api/check", { cache: "no-store" });
        const data = await res.json();
        if (data.ok) {
          box.className = "status ok";
          box.innerHTML =
            "<strong>✅ MCP server is working</strong>" +
            "<pre><code>" + JSON.stringify(data, null, 2) + "</code></pre>";
        } else {
          box.className = "status fail";
          box.innerHTML =
            "<strong>❌ MCP check failed</strong>" +
            "<pre><code>" + JSON.stringify(data, null, 2) + "</code></pre>";
        }
      } catch (err) {
        box.className = "status fail";
        box.textContent = "❌ Request failed: " + err;
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener("click", check);
    check(); // auto-run on load

    // --- AI product search ---
    const form = document.getElementById("searchForm");
    const queryInput = document.getElementById("query");
    const result = document.getElementById("result");

    function escapeHtml(s) {
      return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/"/g, "&quot;");
    }

    function renderProducts(products) {
      if (!Array.isArray(products) || !products.length) return "";
      const cards = products.map(p => {
        const img = p.image
          ? `<img src="${escapeAttr(p.image)}" alt="" loading="lazy" onerror="this.style.display='none'" />`
          : "";
        const priceText = (p.price !== null && p.price !== undefined && p.price !== "")
          ? ((p.currency ? p.currency + " " : "") + p.price)
          : "";
        const price = priceText ? `<div class="price">${escapeHtml(priceText)}</div>` : "";
        const name = escapeHtml(p.name || "Product");
        const title = p.url
          ? `<a href="${escapeAttr(p.url)}" target="_blank" rel="noopener">${name}</a>`
          : name;
        const desc = p.description ? `<div class="desc">${escapeHtml(p.description)}</div>` : "";
        return `<div class="card">${img}<div class="cardbody"><div class="pname">${title}</div>${price}${desc}</div></div>`;
      }).join("");
      return `<div class="grid">${cards}</div>`;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const query = queryInput.value.trim();
      if (!query) return;
      result.style.display = "block";
      result.className = "status pending";
      result.textContent = "Searching with NVIDIA NIM…";
      try {
        const res = await fetch("/api/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query }),
        });
        const data = await res.json();
        if (data.ok) {
          result.className = "status ok";
          const cards = renderProducts(data.products);
          const summary = data.answer
            ? `<div class="summary">${escapeHtml(data.answer)}</div>` : "";
          const empty = (!cards && !data.answer)
            ? "<div>No products found for that query.</div>" : "";
          result.innerHTML =
            "<strong>Results</strong>" + summary + cards + empty +
            "<details><summary>Raw tool data</summary><pre><code>" +
            escapeHtml(JSON.stringify(data.results || [], null, 2)) + "</code></pre></details>";
        } else {
          result.className = "status fail";
          result.innerHTML = "<strong>❌ Search failed</strong><pre><code>" +
            escapeHtml(JSON.stringify(data, null, 2)) + "</code></pre>";
        }
      } catch (err) {
        result.className = "status fail";
        result.textContent = "❌ Request failed: " + err;
      }
    });
  </script>
</body>
</html>
